version: '3.8'

# Minimal stack for local development.
# Run infrastructure/setup.sh first to create infrastructure/.env.local.

services:
  redis:
    image: redis:7-alpine
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in infrastructure/.env.local}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    env_file:
      - infrastructure/.env.local
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-nautilus_trader}
      POSTGRES_USER: ${DB_USER:-nautilus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in infrastructure/.env.local}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    env_file:
      - infrastructure/.env.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nautilus} -d ${DB_NAME:-nautilus_trader}"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
