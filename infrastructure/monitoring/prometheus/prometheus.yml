global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'ai-adaptive-metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'ai_metrics'
