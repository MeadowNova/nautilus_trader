groups:
  - name: infrastructure
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: PostgreSQL exporter is reporting down
          description: Postgres exporter has not been reachable for 2 minutes.

      - alert: RedisDown
        expr: redis_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Redis exporter is reporting down
          description: Redis exporter has not been reachable for 2 minutes.

      - alert: AIAdaptiveMetricsDown
        expr: up{job="ai-adaptive-metrics"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: AI-Adaptive metrics endpoint unreachable
          description: Prometheus failed to scrape the AI-Adaptive metrics job for 5 minutes.

      - alert: AIAdaptiveRedisUnavailable
        expr: ai_redis_up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: AI-Adaptive Redis health check is failing
          description: Internal Redis health gauge reported zero for over 5 minutes. Investigate StrategyCache connectivity.
