# =============================================================================
# POSTGRESQL CONFIGURATION FOR NAUTILUS TRADER
# =============================================================================
# Optimized for trading system workload:
#   - High-frequency small writes (trades, ticks)
#   - Medium-frequency large writes (backtest results)
#   - Fast reads for analysis queries
#   - Time-series data patterns
#
# Adjust based on your system resources:
#   Small (2GB RAM):    shared_buffers=512MB, effective_cache_size=1GB
#   Medium (8GB RAM):   shared_buffers=2GB, effective_cache_size=6GB
#   Large (16GB+ RAM):  shared_buffers=4GB, effective_cache_size=12GB
# =============================================================================

# -----------------------------------------------------------------------------
# CONNECTION SETTINGS
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# -----------------------------------------------------------------------------
# MEMORY SETTINGS (adjust based on available RAM)
# -----------------------------------------------------------------------------
shared_buffers = 512MB                  # ~25% of memory on an 8GB machine
effective_cache_size = 1536MB           # Remaining OS cache expectation
maintenance_work_mem = 256MB            # For VACUUM, CREATE INDEX
work_mem = 8MB                          # Per operation (sort, hash)
temp_buffers = 4MB                      # Per session

# -----------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL) SETTINGS
# -----------------------------------------------------------------------------
wal_level = replica                     # For replication capability
fsync = on                              # Ensure data safety
synchronous_commit = on                 # Wait for WAL flush (can set to off for performance)
wal_buffers = 16MB
checkpoint_timeout = 10min              # More frequent for trading data
max_wal_size = 4GB
min_wal_size = 1GB

# -----------------------------------------------------------------------------
# QUERY TUNING
# -----------------------------------------------------------------------------
random_page_cost = 1.1                  # For SSD (lower = faster random access)
effective_io_concurrency = 200          # For SSD
default_statistics_target = 100         # For better query planning

# -----------------------------------------------------------------------------
# AUTOVACUUM (important for high-frequency writes)
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min               # More frequent for trading data
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_timezone = 'UTC'

# What to log (adjust for debugging)
log_min_duration_statement = 1000       # Log queries > 1 second
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

# -----------------------------------------------------------------------------
# PERFORMANCE MONITORING
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
track_activity_query_size = 2048
track_io_timing = on

# -----------------------------------------------------------------------------
# LOCALE
# -----------------------------------------------------------------------------
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
default_text_search_config = 'pg_catalog.english'
timezone = 'UTC'
